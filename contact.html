<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles/nails.css">
</head>
<body>

<header>
    <img src="images/logo.png" alt="Business Logo" class="logo">

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>

    <section class="page-banner">
        <h1>Contact Us</h1>
    </section>

    <section class="contact-container">

        <div class="contact-info">
            <h2>Get In Touch</h2>

            <p><strong>Phone:</strong> Add Number</p>
            <p><strong>Email:</strong> Add Email</p>
            <p><strong>Location:</strong> Add Address</p>

            <h3>Business Hours</h3>

            <p>Monday - Friday: 8am - 6pm<p>
            <p>Saturday: 8am - 4pm</p>
            <p>Sunday: Closed</p>
        </div>

        <form>

            <label for="name">Name</label>
            <input type="text" id="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" required>

            <label for="message">Message</label>
            <textarea id="message" rows="5"></textarea>

            <button type="submit">Send Message</button>

        </form>

    </section>

</main>

<footer>
    <p>&copy; 2026 Your Nail Business Name</p>
</footer>

</body>
</html>
